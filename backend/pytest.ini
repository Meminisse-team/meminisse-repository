[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
# deepeval(evals/ 폴더의 P3 정량 평가 스크립트가 쓰는 라이브러리)이 자체 pytest
# 플러그인을 자동 등록하는데, 이게 conftest.py의 GATEWAY_BACKEND=mock 기본값
# 강제(os.environ.setdefault)보다 먼저 끼어들어 테스트 스위트 전체가 실제
# Postgres에 붙으려다 실패하는 걸 유발했다(2026-07-13 발견 — deepeval 설치 직후
# 23개 테스트가 무더기로 FK 위반으로 실패). deepeval는 evals/ 스크립트 안에서
# 라이브러리로만 쓰고 pytest 플러그인 기능은 필요 없으므로 비활성화한다.
addopts = -p no:deepeval
